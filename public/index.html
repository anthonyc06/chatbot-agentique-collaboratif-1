<!doctype html>
<!--
  Interface web minimale du chatbot.
  - Envoie les messages de l'utilisateur à POST /api/message
  - Affiche les bulles de conversation (user / bot)
  Contribuez en étendant le frontend ou en remplaçant la logique d'appel.
-->
<html>
<head>
  <meta charset="utf-8">
  <title>Chatbot IA</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <style>
    :root{--bg:#f6f9fb;--card:#ffffff;--user:#dff6ea;--bot:#eef7fb;--muted:#7b8794;--text:#0b2540;--accent:#1f6feb}
    html,body{height:100%;margin:0;font-family:Inter,Segoe UI,Arial,Helvetica,sans-serif;background:linear-gradient(180deg,var(--bg),#eef2f7);color:var(--text);position: absolute;left: 0;right: 0;}
    .app{max-width:980px;margin:28px auto;padding:20px}
    .card{background:var(--card);border-radius:18px;padding:18px;box-shadow:0 18px 40px rgba(15,23,42,0.06);border:1px solid rgba(15,23,42,0.02)}
    header{display:flex;align-items:center;gap:12px;margin-bottom:18px}
    header h1{font-size:20px;margin:0;font-weight:600}
    header .team{margin-left:auto;color:var(--muted);font-size:13px}
    #messages{height:520px;overflow:auto;padding:22px 28px;display:flex;flex-direction:column;gap:18px}
    .bubble{max-width:76%;padding:14px 18px;border-radius:18px;line-height:1.35;box-shadow:0 1px 0 rgba(15,23,42,0.02)}
    .wrap{display:flex;flex-direction:column;gap:6px;width:100%}
    .wrap.user{align-self:flex-end;align-items:flex-end}
    .wrap.bot{align-self:flex-start;align-items:flex-start}
    .bubble.user{background:linear-gradient(90deg,var(--user),#c8f0d9);color:var(--text);text-align:right;border-bottom-right-radius:8px}
    .bubble.bot{background:var(--bot);color:var(--text);text-align:left;border-bottom-left-radius:8px}
    .meta{font-size:12px;color:var(--muted);margin-top:6px}
    .composer{display:flex;gap:12px;padding:18px;border-top:1px solid rgba(15,23,42,0.03)}
    .composer form{display:flex;flex:1;gap:12px}
    .composer input{flex:1;padding:12px 16px;border-radius:999px;border:1px solid rgba(15,23,42,0.06);background:#fff;color:var(--text);box-shadow:inset 0 1px 0 rgba(255,255,255,0.6)}
    .composer button{background:var(--accent);border:none;color:#fff;padding:10px 16px;border-radius:10px;cursor:pointer}
    .composer button:disabled{opacity:0.6;cursor:default}
    .typing{font-size:13px;color:var(--muted);padding-left:6px}
  </style>
</head>
<body>
  <div class="app">
    <div class="card">
      <header>
        <h1>Chatbot IA</h1>
        <div style="margin-left:auto;color:var(--muted);font-size:13px">Team 1</div>
      </header>
      <div id="messages" aria-live="polite"></div>
      <div class="composer">
        <form id="form" style="display:flex;flex:1;gap:8px;width:100%">
          <input id="input" autocomplete="off" placeholder="Écrivez un message..." />
          <button id="send">Envoyer</button>
        </form>
      </div>
    </div>
  </div>

  <script>
    const form = document.getElementById('form');
    const input = document.getElementById('input');
    const messages = document.getElementById('messages');
    const sendBtn = document.getElementById('send');

    // Retourne une chaîne HH:MM pour la méta des messages
    function timeNow() {
      const d = new Date();
      return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }

    // Ajoute une bulle de chat dans la zone des messages.
    // `who` est 'user' ou 'bot' et contrôle le style et l'alignement.
    function appendBubble(text, who) {
      const wrap = document.createElement('div');
      wrap.className = 'wrap ' + who;
      const bubble = document.createElement('div');
      bubble.className = 'bubble ' + who;
      bubble.textContent = text;
      wrap.appendChild(bubble);
      const meta = document.createElement('div');
      meta.className = 'meta';
      meta.textContent = (who === 'user' ? 'User' : 'Bot') + ' · ' + timeNow();
      wrap.appendChild(meta);
      messages.appendChild(wrap);
      // Défiler vers le bas après ajout du message
      messages.scrollTop = messages.scrollHeight;
    }

    // Basculer l'état occupé de l'interface pendant l'attente
    function setBusy(b) {
      sendBtn.disabled = b;
      input.disabled = b;
      sendBtn.textContent = b ? '…' : 'Envoyer';
    }

    // Envoie le message au serveur et affiche la réponse
    async function send(text) {
      appendBubble(text, 'user');
      setBusy(true);

      // Affiche un indicateur de saisie en attendant la réponse
      const typing = document.createElement('div');
      typing.className = 'meta typing';
      typing.textContent = "Bot est en train d'écrire...";
      messages.appendChild(typing);
      messages.scrollTop = messages.scrollHeight;

      try {
        const res = await fetch('/api/message', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
        });
        const data = await res.json();
        messages.removeChild(typing);
        appendBubble(data.reply || 'todo', 'bot');
      } catch (err) {
        // En cas d'erreur réseau, remplacer l'indicateur et informer l'utilisateur
        messages.removeChild(typing);
        appendBubble('Erreur réseau', 'bot');
      } finally {
        setBusy(false);
      }
    }

    // Soumission du formulaire : lecture du champ, nettoyage et envoi
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const text = input.value.trim();
      if (!text) return;
      input.value = '';
      send(text);
    });

    // Message de démonstration initial
    appendBubble('Bonjour, comment puis-je vous aider ?', 'bot');
  </script>
</body>
</html>
